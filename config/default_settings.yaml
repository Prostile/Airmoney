version: 1

parser:
  enabled: false
  check_interval_seconds: 300
  headless: true
  max_scrolls: 1
  request_delay_seconds: 2
  steam_block_pause_seconds: 1800
  selected_exteriors:
    - Factory New
    - Minimal Wear
    - Field-Tested
    - Well-Worn
    - Battle-Scarred

currency:
  provider: steam_currency
  cache_ttl_seconds: 21600
  fallback_usd_to_rub: 72.0
  fallback_eur_to_rub: 86.0

profit:
  global_roi_percent: 12
  market_fee_percent: 15
  min_profit_rub: 300
  min_roi_percent: 7

anomaly:
  enabled: true
  sample:
    min_listings: 8
    target_listings: 30
    max_listings: 60
    exclude_candidate_from_baseline: true
    require_exact_item_match: true
  thresholds:
    min_local_discount_percent: 15.0
    min_float_peer_discount_percent: 12.0
    min_net_profit_rub: 120.0
    min_roi_percent: 8.0
    critical_score: 85
    good_score: 70
    watch_score: 55
  scoring:
    local_discount_weight: 0.45
    float_peer_discount_weight: 0.35
    historical_discount_weight: 0.15
    float_quality_weight: 0.05
  float_buckets:
    - id: micro
      min: 0.0
      max: 0.005
    - id: very_low
      min: 0.005
      max: 0.01
    - id: craft_low
      min: 0.01
      max: 0.015
    - id: low_fn
      min: 0.015
      max: 0.03
    - id: normal_fn
      min: 0.03
      max: 0.07
  nearest_neighbors:
    enabled: true
    k: 7
    min_neighbors: 5
    max_float_distance: 0.025
  history:
    enabled: false
    storage: sqlite
    ewma_alpha: 0.25
    min_snapshots: 5

telegram:
  enabled: false
  min_alert_level: good
  message_format: compact
  include_link: true
  include_pattern: false
  include_sample_stats: false
  include_reasons: false
  batch_alerts: true
  batch_interval_seconds: 60
  max_alerts_per_message: 5
  max_message_length: 3500

collections: []
items: []
rules: []
