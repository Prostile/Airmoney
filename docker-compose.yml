services:
  container-1:
    image: ${SING_BOX_IMAGE:-ghcr.io/sagernet/sing-box:v1.13.13}
    container_name: container-1
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./vpn/sing-box.json:/etc/sing-box/config.json:ro
      - sing-box-data:/var/lib/sing-box
    command: ["run", "--config", "/etc/sing-box/config.json", "--directory", "/var/lib/sing-box"]
    expose:
      - "8000"
    networks:
      - airmoney_net

  airmoney-app:
    container_name: airmoney-app
    build:
      context: .
    restart: unless-stopped
    depends_on:
      container-1:
        condition: service_started
    network_mode: "service:container-1"
    env_file:
      - .env
    environment:
      AIRMONEY_BROWSER_PROXY: http://127.0.0.1:10808
      HTTP_PROXY: http://127.0.0.1:10808
      HTTPS_PROXY: http://127.0.0.1:10808
      ALL_PROXY: http://127.0.0.1:10808
      NO_PROXY: 127.0.0.1,localhost,container-1,airmoney-app
      http_proxy: http://127.0.0.1:10808
      https_proxy: http://127.0.0.1:10808
      all_proxy: http://127.0.0.1:10808
      no_proxy: 127.0.0.1,localhost,container-1,airmoney-app
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; s = socket.create_connection(('127.0.0.1', 8000), 3); s.close()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  airmoney_net:
    name: airmoney_net

volumes:
  sing-box-data:
