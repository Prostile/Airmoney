<section class="scan-progress card shadow-lg" data-scan-progress hidden>
  <div class="card-body">
    <div class="d-flex align-items-start justify-content-between gap-3">
      <div class="text-truncate">
        <div class="fw-bold" data-scan-title>Сканирование</div>
        <div class="text-secondary text-truncate" data-scan-message>Подготовка</div>
      </div>
      <div class="scan-progress__percent" data-scan-percent>0%</div>
    </div>
    <div class="progress progress-sm mt-3" aria-hidden="true">
      <div class="progress-bar" data-scan-bar style="width: 0%"></div>
    </div>
    <div class="d-flex align-items-center justify-content-between gap-3 mt-2 text-secondary small">
      <span data-scan-count>0 / 0</span>
      <span class="text-truncate" data-scan-counters>Лотов 0, кандидатов 0</span>
    </div>
  </div>
</section>
