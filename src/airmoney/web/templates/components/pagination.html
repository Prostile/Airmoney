{% if pagination and pagination.pages > 1 %}
<div class="card-footer d-flex align-items-center justify-content-between gap-3 flex-wrap">
  <div class="text-secondary small">
    Showing {{ pagination.start }}-{{ pagination.end }} of {{ pagination.total }} records
  </div>
  <div class="btn-list">
    <a class="btn btn-outline-secondary btn-sm {% if not pagination.has_prev %}disabled{% endif %}" href="{{ pagination.prev_url if pagination.has_prev else '#' }}">Prev</a>
    <span class="text-secondary small">Page {{ pagination.page }} / {{ pagination.pages }}</span>
    <a class="btn btn-outline-secondary btn-sm {% if not pagination.has_next %}disabled{% endif %}" href="{{ pagination.next_url if pagination.has_next else '#' }}">Next</a>
  </div>
</div>
{% endif %}
